<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Courier New", monospace; background: #0a0a0a; }
  #map { width: 100vw; height: 100vh; }

  .apn-label {
    background: none !important;
    border: none !important;
    box-shadow: none !important;
    font-family: "Courier New", monospace;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 4px #000, 0 0 4px #000, 1px 1px 2px #000, -1px -1px 2px #000;
    white-space: nowrap;
    pointer-events: none;
  }

  .panel {
    position: fixed;
    top: 12px;
    right: 12px;
    background: rgba(10, 10, 10, 0.92);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 8px;
    padding: 16px 20px;
    color: #ddd;
    font-family: "Courier New", monospace;
    font-size: 12px;
    z-index: 1000;
    width: 290px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .panel h2 {
    color: #ffdd00;
    font-size: 14px;
    margin-bottom: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(255,221,0,0.2);
    padding-bottom: 8px;
  }

  .section-header {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 12px 0 6px 0;
  }

  .ranch-group {
    margin: 6px 0;
    padding: 8px 10px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03);
  }

  .ranch-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    margin-bottom: 4px;
  }
  .ranch-toggle input { accent-color: #ffdd00; }
  .ranch-name { font-weight: 700; font-size: 12px; }
  .ranch-meta {
    font-size: 10px;
    color: #888;
    margin-left: 22px;
    line-height: 1.6;
  }

  .swatch {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.15);
    vertical-align: middle;
    margin-right: 4px;
  }

  .global-toggles {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .global-toggles label {
    display: flex; align-items: center; gap: 5px; font-size: 11px; cursor: pointer;
  }
  .global-toggles input { accent-color: #ffdd00; }

  .llc-section { margin-top: 10px; }
  .llc-header {
    font-size: 11px;
    color: #aaa;
    font-weight: 700;
    margin: 8px 0 4px 0;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .badge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 4px;
    background: rgba(68,238,119,0.2);
    color: #44ee77;
  }

  .zoom-btn {
    font-size: 10px;
    color: #ffdd00;
    background: rgba(255,221,0,0.1);
    border: 1px solid rgba(255,221,0,0.3);
    border-radius: 3px;
    padding: 2px 6px;
    cursor: pointer;
    margin-left: auto;
  }
  .zoom-btn:hover { background: rgba(255,221,0,0.2); }

  /* Search box */
  .search-wrap {
    position: relative;
    margin-bottom: 10px;
  }
  #searchInput {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 5px;
    color: #eee;
    font-family: "Courier New", monospace;
    font-size: 11px;
    padding: 6px 28px 6px 8px;
    outline: none;
    box-sizing: border-box;
  }
  #searchInput::placeholder { color: #555; }
  #searchInput:focus { border-color: rgba(255,221,0,0.5); }
  #searchClear {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #555; cursor: pointer;
    font-size: 13px; line-height: 1; display: none;
  }
  #searchResults {
    margin-top: 4px;
    max-height: 140px;
    overflow-y: auto;
  }
  .search-result-item {
    padding: 5px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    border: 1px solid transparent;
    margin-bottom: 2px;
    background: rgba(255,255,255,0.04);
    line-height: 1.4;
  }
  .search-result-item:hover { background: rgba(255,221,0,0.1); border-color: rgba(255,221,0,0.3); }
  .search-result-apn { font-weight: 700; }
  .search-result-sub { color: #777; font-size: 10px; }

  /* Map layer toggle */
  .layer-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 10px;
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .layer-btn {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: none;
    color: #888;
    font-family: "Courier New", monospace;
    font-size: 10px;
    padding: 6px 4px;
    cursor: pointer;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .layer-btn:not(:last-child) { border-right: 1px solid rgba(255,255,255,0.1); }
  .layer-btn.active { background: rgba(255,221,0,0.18); color: #ffdd00; }
  .layer-btn:hover:not(.active) { background: rgba(255,255,255,0.08); color: #ccc; }

  /* Acreage bar chart */
  .chart-section { margin-top: 10px; }
  .chart-bar-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
    font-size: 10px;
  }
  .chart-bar-label {
    width: 72px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #bbb;
  }
  .chart-bar-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    overflow: hidden;
  }
  .chart-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .chart-bar-val {
    width: 52px;
    flex-shrink: 0;
    text-align: right;
    color: #888;
    font-size: 9px;
  }
</style>
</head>

  <div style="background:#ffffff;border-radius:12px;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4);">

    <input type="password" id="pw-input" placeholder="Enter password&hellip;" onkeydown="if(event.key==='Enter')checkPw()" style="width:100%;padding:10px 14px;border:1px solid #ccc9be;border-radius:6px;font-size:14px;font-family:sans-serif;outline:none;margin-bottom:10px;box-sizing:border-box;" />
    <div id="pw-error" style="color:#8b2020;font-size:12px;font-family:sans-serif;margin-bottom:8px;display:none;">Incorrect password. Please try again.</div>
    <button onclick="checkPw()" style="width:100%;padding:10px;background:#2d6a2d;color:white;border:none;border-radius:6px;font-size:14px;font-weight:600;font-family:sans-serif;cursor:pointer;">Unlock</button>
  </div>
</div>
<script>
var HASH = -747169588;
function djb(s){var h=0;for(var i=0;i<s.length;i++){h=((31*h)+s.charCodeAt(i))&0xFFFFFFFF;if(h>=0x80000000)h-=0x100000000;}return h;}
function checkPw(){
  var s=document.getElementById('pw-input').value;
  if(djb(s)===HASH){document.getElementById('pw-overlay').style.display='none';sessionStorage.setItem('lo_auth',HASH);}
  else{document.getElementById('pw-error').style.display='block';document.getElementById('pw-input').value='';}
}
if(sessionStorage.getItem('lo_auth')==String(HASH)){document.getElementById('pw-overlay').style.display='none';}
</script>

const RANCH_COLORS = {
  'Slack and Riley': '#ff3c3c',
  'JE Wilkinson': '#00aaff',
  'Eilers North': '#44ee77',
  'Eilers South': '#ffaa00',
  'Bidart': '#cc55ff'
};

const LLC_ORDER = [
  { llc: 'Slack & Riley LLC', ranches: ['Slack and Riley'] },
  { llc: 'Los Cerros del Halcon LLC', ranches: ['JE Wilkinson'] },
  { llc: 'Los Llanos del Halcon LLC', ranches: ['Eilers North', 'Eilers South'] },
  { llc: 'Los Canones del Halcon LLC', ranches: ['Bidart'] }
];

const RANCH_META = {};
boundaryData.features.forEach(f => {
  const p = f.properties;
  RANCH_META[p.RanchName] = { llc: p.LLC, acres: p.Acres, parcels: p.Parcels, complete: p.Complete };
});

const map = L.map('map', { center: [36.85, -120.85], zoom: 11 });

// ---- Base tile layers ----
const TILE_LAYERS = {
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Esri, Maxar, Earthstar Geographics', maxZoom: 19
  }),
  terrain: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Shaded_Relief/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Esri, USGS', maxZoom: 13
  }),
  topo: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Esri, NGS, USGS', maxZoom: 19
  })
};
TILE_LAYERS.satellite.addTo(map);
let currentBaseLayer = 'satellite';

// Helper: attach both click and touchstart (prevents double-fire on desktop)
function onTap(el, handler) {
  el.addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    handler.call(this, e);
  }, { passive: false });
  el.addEventListener('click', function(e) {
    handler.call(this, e);
  });
}

document.querySelectorAll('.layer-btn').forEach(btn => {
  onTap(btn, function() {
    const layer = this.dataset.layer;
    if (layer === currentBaseLayer) return;
    map.removeLayer(TILE_LAYERS[currentBaseLayer]);
    TILE_LAYERS[layer].addTo(map);
    TILE_LAYERS[layer].bringToBack();
    currentBaseLayer = layer;
    document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});

const boundaryLayers = {};
const parcelLayers = {};
const labelLayers = {};

Object.keys(RANCH_COLORS).forEach(ranch => {
  const color = RANCH_COLORS[ranch];

  const bFeats = boundaryData.features.filter(f => f.properties.RanchName === ranch);
  if (bFeats.length) {
    boundaryLayers[ranch] = L.geoJSON({type:"FeatureCollection",features:bFeats}, {
      style: { color: color, weight: 3, opacity: 0.9, fillColor: color, fillOpacity: 0.1 }
    }).addTo(map);
  }

  const pFeats = parcelData.features.filter(f => f.properties.RanchName === ranch);
  if (pFeats.length) {
    parcelLayers[ranch] = L.geoJSON({type:"FeatureCollection",features:pFeats}, {
      style: { color: color, weight: 1.2, opacity: 0.5, fillColor: color, fillOpacity: 0.05 },
      onEachFeature: function(feature, layer) {
        const p = feature.properties;
        const apn = p.CSV_APN || p.APN || '';
        const acres = (p.Acres || 0).toFixed(1);
        const county = p.County || '';
        const situs = p.Situs || '';
        const bookpage = p.BookPage || '';
        const assemap = p.AsseMap || '';
        const taxbill = p.TaxBill || '';
        layer.bindPopup(
          '<div style="font-family:Courier New,monospace;font-size:13px;">'+
          '<b style="color:'+color+';">'+ranch+'</b><br>'+
          '<span style="color:#aaa;font-size:11px;">'+(RANCH_META[ranch]||{}).llc+'</span><br>'+
          '<b style="color:#ffdd00;">APN '+apn+'</b><br>'+
          (county ? '<span style="color:#ccc;font-size:11px;">'+county+' County</span><br>' : '')+
          (situs ? situs+'<br>' : '')+
          '<span style="color:#88ccff;">'+acres+' ac</span>'+
          (bookpage ? '<br><span style="color:#aaa;font-size:10px;">Book-Page: '+bookpage+'</span>' : '')+
          '<div style="margin-top:6px;display:flex;gap:6px;">'+
          (assemap ? '<a href="'+assemap+'" target="_blank" style="color:#ffdd00;font-size:10px;background:rgba(255,221,0,0.1);border:1px solid rgba(255,221,0,0.3);border-radius:3px;padding:2px 6px;text-decoration:none;">📄 Assessor Map</a>' : '')+
          (taxbill ? '<a href="'+taxbill+'" target="_blank" style="color:#44ee77;font-size:10px;background:rgba(68,238,119,0.1);border:1px solid rgba(68,238,119,0.3);border-radius:3px;padding:2px 6px;text-decoration:none;">💰 Tax Bill</a>' : '')+
          '</div>'+
          '</div>'
        );
      }
    }).addTo(map);
  }

  const labelGroup = L.layerGroup();
  const seen = new Set();
  pFeats.forEach(function(feature) {
    const apn = feature.properties.CSV_APN || feature.properties.APN || '';
    if (seen.has(apn)) return;
    seen.add(apn);
    let coords = [];
    const geom = feature.geometry;
    if (geom.type === 'Polygon') { coords = geom.coordinates[0]; }
    else if (geom.type === 'MultiPolygon') {
      let maxLen = 0;
      geom.coordinates.forEach(poly => { if(poly[0].length>maxLen){maxLen=poly[0].length;coords=poly[0];} });
    }
    let cx=0, cy=0;
    coords.forEach(c => { cx+=c[0]; cy+=c[1]; });
    cx /= coords.length; cy /= coords.length;
    const icon = L.divIcon({className:'apn-label',html:'<span style="color:'+color+'">'+apn+'</span>',iconSize:[100,14],iconAnchor:[50,7]});
    L.marker([cy,cx],{icon:icon}).addTo(labelGroup);
  });
  labelLayers[ranch] = labelGroup;
});

const allBounds = L.geoJSON(boundaryData).getBounds();
map.fitBounds(allBounds.pad(0.08));

// ---- APN label scaling with zoom ----
function updateLabelSizes() {
  const z = map.getZoom();
  // Scale: 9px at zoom≤10, up to 18px at zoom≥16
  const size = Math.round(Math.max(9, Math.min(18, 9 + (z - 10) * 1.5)));
  document.querySelectorAll('.apn-label span').forEach(el => {
    el.style.fontSize = size + 'px';
  });
}
map.on('zoomend', updateLabelSizes);
map.on('layeradd', updateLabelSizes); // also fires when label layers are toggled on

// ---- Panel ----
const listEl = document.getElementById('ranch-list');
let totalAcres = 0, totalParcels = 0;

LLC_ORDER.forEach(group => {
  const llcDiv = document.createElement('div');
  llcDiv.className = 'llc-section';
  llcDiv.innerHTML = '<div class="llc-header">'+group.llc+'</div>';

  group.ranches.forEach(ranch => {
    const meta = RANCH_META[ranch];
    if (!meta) return;
    const color = RANCH_COLORS[ranch];
    totalAcres += meta.acres;
    totalParcels += meta.parcels;

    const div = document.createElement('div');
    div.className = 'ranch-group';
    div.innerHTML =
      '<label class="ranch-toggle">'+
      '<input type="checkbox" checked data-ranch="'+ranch+'">'+
      '<span class="swatch" style="background:'+color+';"></span>'+
      '<span class="ranch-name">'+ranch+'</span>'+
      '<span class="badge">✓</span>'+
      '<button class="zoom-btn" data-ranch="'+ranch+'">zoom</button>'+
      '</label>'+
      '<div class="ranch-meta">'+
      meta.parcels+' parcels · '+meta.acres.toLocaleString()+' ac'+
      '</div>';

    div.querySelector('input').addEventListener('change', function() {
      const r = this.dataset.ranch;
      if (this.checked) {
        if (boundaryLayers[r] && document.getElementById('showBoundaries').checked) map.addLayer(boundaryLayers[r]);
        if (parcelLayers[r] && document.getElementById('showParcels').checked) map.addLayer(parcelLayers[r]);
        if (labelLayers[r] && document.getElementById('showLabels').checked) map.addLayer(labelLayers[r]);
      } else {
        if (boundaryLayers[r]) map.removeLayer(boundaryLayers[r]);
        if (parcelLayers[r]) map.removeLayer(parcelLayers[r]);
        if (labelLayers[r]) map.removeLayer(labelLayers[r]);
      }
    });

    onTap(div.querySelector('.zoom-btn'), function(e) {
      e.preventDefault();
      const r = this.dataset.ranch;
      if (boundaryLayers[r]) map.fitBounds(boundaryLayers[r].getBounds().pad(0.15));
    });

    llcDiv.appendChild(div);
  });
  listEl.appendChild(llcDiv);
});

document.getElementById('summary').innerHTML =
  'Total parcels: '+totalParcels+'<br>'+
  'Total acres: '+totalAcres.toLocaleString()+'<br>'+
  'Counties: San Benito, Merced, Fresno<br>'+
  '<span style="color:#44ee77;">✓ All 89 parcels mapped</span>';

function getActiveRanches() {
  return [...document.querySelectorAll('input[data-ranch]')].filter(cb=>cb.checked).map(cb=>cb.dataset.ranch);
}
document.getElementById('showBoundaries').addEventListener('change', function() {
  getActiveRanches().forEach(r => {
    if (boundaryLayers[r]) { this.checked ? map.addLayer(boundaryLayers[r]) : map.removeLayer(boundaryLayers[r]); }
  });
});
document.getElementById('showParcels').addEventListener('change', function() {
  getActiveRanches().forEach(r => {
    if (parcelLayers[r]) { this.checked ? map.addLayer(parcelLayers[r]) : map.removeLayer(parcelLayers[r]); }
  });
});
document.getElementById('showLabels').addEventListener('change', function() {
  getActiveRanches().forEach(r => {
    if (labelLayers[r]) { this.checked ? map.addLayer(labelLayers[r]) : map.removeLayer(labelLayers[r]); }
  });
});

// ---- Search ----
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchResults = document.getElementById('searchResults');
let highlightLayer = null;

function clearHighlight() {
  if (highlightLayer) { map.removeLayer(highlightLayer); highlightLayer = null; }
}

searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  searchClear.style.display = q ? 'block' : 'none';
  searchResults.innerHTML = '';
  clearHighlight();
  if (q.length < 2) return;

  const matches = parcelData.features.filter(f => {
    const p = f.properties;
    const apn = (p.CSV_APN || p.APN || '').toLowerCase();
    const situs = (p.Situs || '').toLowerCase();
    return apn.includes(q) || situs.includes(q);
  }).slice(0, 8);

  matches.forEach(feature => {
    const p = feature.properties;
    const ranch = p.RanchName;
    const color = RANCH_COLORS[ranch] || '#fff';
    const apn = p.CSV_APN || p.APN || '';
    const acres = (p.Acres || 0).toFixed(1);
    const situs = p.Situs || '';
    const div = document.createElement('div');
    div.className = 'search-result-item';
    div.innerHTML =
      '<div class="search-result-apn" style="color:'+color+';">'+apn+'</div>' +
      '<div class="search-result-sub">'+ranch+' · '+acres+' ac'+(situs?' · '+situs:'')+'</div>';
    onTap(div, function() {
      clearHighlight();
      highlightLayer = L.geoJSON(feature, {
        style: { color: '#ffdd00', weight: 3, opacity: 1, fillColor: '#ffdd00', fillOpacity: 0.25 }
      }).addTo(map);
      map.fitBounds(highlightLayer.getBounds().pad(0.3));
      // open popup
      const lyr = Object.values(parcelLayers).find(pl => {
        let found = false;
        pl.eachLayer(l => { if (l.feature && (l.feature.properties.CSV_APN===apn || l.feature.properties.APN===apn)) found=true; });
        return found;
      });
      if (lyr) {
        lyr.eachLayer(l => {
          if (l.feature && (l.feature.properties.CSV_APN===apn || l.feature.properties.APN===apn)) {
            l.openPopup();
          }
        });
      }
      searchResults.innerHTML = '';
      searchInput.value = apn;
    });
    searchResults.appendChild(div);
  });

  if (matches.length === 0) {
    searchResults.innerHTML = '<div style="font-size:10px;color:#555;padding:4px 0;">No results</div>';
  }
});

onTap(searchClear, function() {
  searchInput.value = '';
  searchClear.style.display = 'none';
  searchResults.innerHTML = '';
  clearHighlight();
});

// ---- Acreage chart ----
const chartEl = document.getElementById('acreage-chart');
const ranchAcres = Object.keys(RANCH_COLORS).map(r => ({
  name: r, acres: RANCH_META[r] ? RANCH_META[r].acres : 0, color: RANCH_COLORS[r]
}));
const maxAcres = Math.max(...ranchAcres.map(r => r.acres));

ranchAcres.sort((a,b) => b.acres - a.acres).forEach(r => {
  const pct = maxAcres > 0 ? (r.acres / maxAcres * 100).toFixed(1) : 0;
  const acLabel = r.acres >= 1000 ? (r.acres/1000).toFixed(1)+'k ac' : r.acres.toFixed(0)+' ac';
  const row = document.createElement('div');
  row.className = 'chart-bar-row';
  row.innerHTML =
    '<div class="chart-bar-label" title="'+r.name+'">'+r.name+'</div>' +
    '<div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:'+r.color+';"></div></div>' +
    '<div class="chart-bar-val">'+acLabel+'</div>';
  chartEl.appendChild(row);
});

// ---- Acreage by County chart ----
const countyChartEl = document.getElementById('county-chart');
const countyAcres = {};
const countyColors = {
  'San Benito': '#ffdd00',
  'Merced':     '#44aaff',
  'Fresno':     '#ff7744'
};
parcelData.features.forEach(function(f) {
  const county = f.properties.County || 'Unknown';
  const acres = f.properties.Acres || 0;
  countyAcres[county] = (countyAcres[county] || 0) + acres;
});
const countyList = Object.keys(countyAcres).map(c => ({ name: c, acres: countyAcres[c] }));
const maxCountyAcres = Math.max(...countyList.map(c => c.acres));
countyList.sort((a,b) => b.acres - a.acres).forEach(c => {
  const pct = maxCountyAcres > 0 ? (c.acres / maxCountyAcres * 100).toFixed(1) : 0;
  const acLabel = c.acres >= 1000 ? (c.acres/1000).toFixed(1)+'k ac' : c.acres.toFixed(0)+' ac';
  const color = countyColors[c.name] || '#aaa';
  const row = document.createElement('div');
  row.className = 'chart-bar-row';
  row.innerHTML =
    '<div class="chart-bar-label" title="'+c.name+' County">'+c.name+'</div>' +
    '<div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:'+color+';"></div></div>' +
    '<div class="chart-bar-val">'+acLabel+'</div>';
  countyChartEl.appendChild(row);
});
</script>
</body>
